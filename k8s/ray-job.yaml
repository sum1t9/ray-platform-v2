apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: ray-pipeline-job-v2
  namespace: ray
spec:
  entrypoint: "python ray_pipeline.py"

  runtimeEnvYAML: |
    env_vars:
      SUPPLYCHAIN_DATA_S1_PATH: "gs://ray-platform-v2-ray2-data-bucket/data/SupplyChain_Data_S1.csv"
      FINANCIAL_DATA_S2_PATH: "gs://ray-platform-v2-ray2-data-bucket/data/Financial_Data_S2.csv"

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 300

  submitterPodTemplate:
    spec:
      restartPolicy: Never
      nodeSelector:
        node-role: system
      containers:
        - name: ray-job-submitter
          image: "asia-south1-docker.pkg.dev/ray-platform-v2/ray-repo-v2/ray-pipeline-v2:latest"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

  rayClusterSpec:
    rayVersion: "2.9.0"
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        num-cpus: "1"
        object-store-memory: "100000000"
      template:
        spec:
          serviceAccountName: ray-head-sa-v2
          nodeSelector:
            node-role: system
          containers:
            - name: ray-head
              image: "asia-south1-docker.pkg.dev/ray-platform-v2/ray-repo-v2/ray-pipeline-v2:latest"
              env:
                - name: SUPPLYCHAIN_DATA_S1_PATH
                  value: "gs://ray-platform-v2-ray2-data-bucket/data/SupplyChain_Data_S1.csv"
                - name: FINANCIAL_DATA_S2_PATH
                  value: "gs://ray-platform-v2-ray2-data-bucket/data/Financial_Data_S2.csv"
                - name: LLM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: llm-api-secret-v2
                      key: LLM_API_KEY
                - name: RAY_OBJECT_STORE_MEMORY
                  value: "100000000"
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"

    workerGroupSpecs:
      - groupName: workers
        replicas: 1
        minReplicas: 1
        maxReplicas: 5
        rayStartParams:
          num-cpus: "1"
          object-store-memory: "100000000"
          resources: '"{\"entity_resolver\": 1}"'
        template:
          spec:
            nodeSelector:
              node-role: worker
            serviceAccountName: ray-worker-sa-v2
            tolerations:
              - key: "ray-worker"
                operator: "Equal"
                value: "true"
                effect: "NoSchedule"
            containers:
              - name: ray-worker
                image: "asia-south1-docker.pkg.dev/ray-platform-v2/ray-repo-v2/ray-pipeline-v2:latest"
                env:
                  - name: SUPPLYCHAIN_DATA_S1_PATH
                    value: "gs://ray-platform-v2-ray2-data-bucket/data/SupplyChain_Data_S1.csv"
                  - name: FINANCIAL_DATA_S2_PATH
                    value: "gs://ray-platform-v2-ray2-data-bucket/data/Financial_Data_S2.csv"
                  - name: LLM_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: llm-api-secret-v2
                        key: LLM_API_KEY
                  - name: RAY_OBJECT_STORE_MEMORY
                    value: "100000000"
                resources:
                  requests:
                    cpu: "200m"
                    memory: "512Mi"
                  limits:
                    cpu: "1"
                    memory: "2Gi"