apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ray-namespace-default-deny-v2
  namespace: ray
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443